name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: https://goxaeupwxhbiobvvwnxj.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_j5ibrtWDjEvXWKzuYZMO3g_F-sflqZn
          VITE_TENANT_ID: 819085f6-19da-41b5-a22c-345198c96699
          run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
