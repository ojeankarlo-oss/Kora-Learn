<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kora-learn</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- VLibras (tradutor de Língua Brasileira de Sinais do governo federal) -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      (function iniciarVLibras() {
        // O script pode falhar ao carregar (rede, CDN fora do ar); nesse caso
        // simplesmente não inicializamos o widget, sem quebrar o resto da aplicação.
        if (window.VLibras && typeof window.VLibras.Widget === "function") {
          new window.VLibras.Widget("https://vlibras.gov.br/app");
        } else {
          window.addEventListener("load", function () {
            if (window.VLibras && typeof window.VLibras.Widget === "function") {
              new window.VLibras.Widget("https://vlibras.gov.br/app");
            }
          });
        }
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
